<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>投票结果 · 越山向海</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
  background: linear-gradient(170deg, #e8f4f8, #c9e8f0, #a8d8ea);
  min-height: 100vh; padding: 40px 20px;
  display: flex; flex-direction: column; align-items: center;
}
.card {
  background: rgba(255,255,255,.92); border-radius: 24px;
  padding: 40px 30px; width: 100%; max-width: 520px;
  box-shadow: 0 8px 40px rgba(16,80,120,.1);
}
h1 {
  text-align: center; font-size: 24px; font-weight: 800;
  background: linear-gradient(135deg, #0077b6, #48cae4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text; margin-bottom: 8px;
}
.subtitle { text-align: center; color: #6b8a9a; font-size: 14px; margin-bottom: 28px; }
.total {
  text-align: center; font-size: 48px; font-weight: 900;
  color: #0077b6; margin-bottom: 4px;
}
.total-label { text-align: center; color: #8ab4c4; font-size: 13px; margin-bottom: 28px; }
.bar-wrap { margin: 8px 0 16px; }
.bar-label { font-size: 14px; color: #2a6178; display: flex; justify-content: space-between; margin-bottom: 4px; }
.bar-label span:last-child { color: #5b96ab; font-size: 12px; }
.bar-track { height: 28px; background: #edf6fa; border-radius: 8px; overflow: hidden; }
.bar-fill {
  height: 100%; border-radius: 8px;
  background: linear-gradient(90deg, #0077b6, #48cae4);
  transition: width .5s; display: flex; align-items: center;
  padding-left: 10px; color: #fff; font-size: 12px; font-weight: 700; min-width: 40px;
}
.refresh {
  margin-top: 24px; text-align: center;
}
.refresh button {
  padding: 10px 28px; background: #0077b6; color: #fff;
  border: none; border-radius: 10px; font-size: 14px; cursor: pointer;
}
.refresh button:hover { background: #0096c7; }
.auto-refresh { text-align: center; color: #8ab4c4; font-size: 12px; margin-top: 10px; }
.error { text-align: center; color: #e76f51; padding: 40px; }
</style>
</head>
<body>
<div class="card">
  <h1>越山向海 · 投票结果</h1>
  <p class="subtitle">听到「今年继续」，你的第一反应是什么？</p>
  <div class="total" id="totalCount">-</div>
  <div class="total-label">人已投票</div>
  <div id="bars"></div>
  <div class="refresh"><button onclick="load()">🔄 刷新</button></div>
  <div class="auto-refresh">每 10 秒自动刷新</div>
</div>

<script>
const API = 'https://jsonblob.com/api/jsonBlob/019f64d8-019d-7ff1-92fe-2a97b178f807';
const LABELS = ['🔥 很燃，但感觉和我没什么关系','💪 想支持，但确实没有时间','🤷 我不跑步，不知道能做什么','👀 有点好奇，但还没准备好','🌟 我愿意进一步了解'];

async function load() {
  try {
    const r = await fetch(API);
    const data = await r.json();
    const counts = data.counts || [0,0,0,0,0];
    const total = counts.reduce((a,b)=>a+b,0);
    document.getElementById('totalCount').textContent = total;
    document.getElementById('bars').innerHTML = counts.map((c,i) => {
      const pct = total > 0 ? Math.round(c/total*100) : 0;
      return `<div class="bar-wrap">
        <div class="bar-label"><span>${LABELS[i]}</span><span>${c} 票 (${pct}%)</span></div>
        <div class="bar-track"><div class="bar-fill" style="width:${Math.max(pct,c>0?4:0)}%">${pct>10?pct+'%':''}</div></div>
      </div>`;
    }).join('');
  } catch(e) {
    document.getElementById('bars').innerHTML = '<div class="error">加载失败，点刷新重试</div>';
  }
}
load();
setInterval(load, 10000);
</script>
</body>
</html>
